<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Car Deal Finder</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; }

        .nav { background: #1a1a2e; padding: 16px 30px; border-bottom: 2px solid #16213e; display: flex; align-items: center; gap: 20px; }
        .nav h1 { font-size: 22px; color: #fff; }
        .nav a { color: #4a9eff; text-decoration: none; font-size: 14px; padding: 6px 14px; border-radius: 6px; }
        .nav a:hover { background: rgba(74,158,255,0.1); }
        .nav .spacer { flex: 1; }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 25px; }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .stat-card {
            background: #1a1a2e; border: 1px solid #222; border-radius: 10px;
            padding: 20px; text-align: center;
        }
        .stat-card .value { font-size: 32px; font-weight: 700; color: #fff; }
        .stat-card .label { font-size: 13px; color: #888; margin-top: 4px; }

        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
        .chart-box {
            background: #1a1a2e; border: 1px solid #222; border-radius: 12px;
            padding: 24px;
        }
        .chart-box.full { grid-column: 1 / -1; }
        .chart-box h3 { font-size: 16px; color: #fff; margin-bottom: 16px; }
        .chart-box canvas { max-height: 350px; }

        .table-box {
            background: #1a1a2e; border: 1px solid #222; border-radius: 12px;
            padding: 24px; margin-bottom: 28px;
        }
        .table-box h3 { font-size: 16px; color: #fff; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; color: #888; font-weight: 500; padding: 8px 12px; border-bottom: 1px solid #333; }
        td { padding: 8px 12px; border-bottom: 1px solid #1a1a2e; }
        tr:hover td { background: rgba(74,158,255,0.05); }

        .loading { text-align: center; padding: 60px; color: #666; font-size: 16px; }

        @media (max-width: 768px) {
            .chart-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="nav">
        <h1>Analytics</h1>
        <div class="spacer"></div>
        <a href="/">Deals</a>
        <a href="/settings">Settings</a>
    </div>

    <div class="container">
        <div class="loading" id="loading">Loading data...</div>

        <div id="content" style="display:none;">
            <!-- Summary Stats -->
            <div class="stats-row" id="stats-row"></div>

            <!-- Charts -->
            <div class="chart-grid">
                <div class="chart-box">
                    <h3>Listings by Source</h3>
                    <canvas id="sourceChart"></canvas>
                </div>
                <div class="chart-box">
                    <h3>Listings by Car</h3>
                    <canvas id="carChart"></canvas>
                </div>
                <div class="chart-box">
                    <h3>Price Distribution</h3>
                    <canvas id="priceChart"></canvas>
                </div>
                <div class="chart-box">
                    <h3>Avg Price by Car</h3>
                    <canvas id="avgPriceChart"></canvas>
                </div>
                <div class="chart-box full">
                    <h3>Price vs Mileage</h3>
                    <canvas id="scatterChart"></canvas>
                </div>
            </div>

            <!-- Best Value Table -->
            <div class="table-box">
                <h3>Lowest Price per Car</h3>
                <table id="bestTable">
                    <thead>
                        <tr><th>Car</th><th>Year</th><th>Price</th><th>Mileage</th><th>Source</th><th>Deal Rating</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
    const COLORS = ['#4a9eff','#ff6b6b','#4aff8a','#ffda6b','#c084fc','#ff8c42','#42d4f4','#f542d4'];
    const chartDefaults = {
        color: '#888',
        borderColor: '#333',
    };
    Chart.defaults.color = '#aaa';
    Chart.defaults.borderColor = '#222';

    fetch('/api/analytics')
        .then(r => r.json())
        .then(data => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            render(data);
        });

    function render({ listings, averages }) {
        // ── Summary Stats ──
        const sources = [...new Set(listings.map(l => l.source))];
        const cars = [...new Set(listings.map(l => l.car_query))];
        const prices = listings.map(l => l.price).filter(p => p > 0);
        const avgPrice = prices.length ? Math.round(prices.reduce((a,b) => a+b, 0) / prices.length) : 0;
        const medianPrice = prices.length ? prices.sort((a,b) => a-b)[Math.floor(prices.length/2)] : 0;
        const withMileage = listings.filter(l => l.mileage && l.mileage > 0);
        const avgMileage = withMileage.length
            ? Math.round(withMileage.reduce((a,l) => a + l.mileage, 0) / withMileage.length)
            : 0;

        const statsHtml = [
            { value: listings.length, label: 'Total Listings' },
            { value: sources.length, label: 'Sources' },
            { value: cars.length, label: 'Cars Tracked' },
            { value: `$${avgPrice.toLocaleString()}`, label: 'Avg Price' },
            { value: `$${medianPrice.toLocaleString()}`, label: 'Median Price' },
            { value: avgMileage.toLocaleString(), label: 'Avg Mileage' },
        ].map(s => `<div class="stat-card"><div class="value">${s.value}</div><div class="label">${s.label}</div></div>`).join('');
        document.getElementById('stats-row').innerHTML = statsHtml;

        // ── Listings by Source (doughnut) ──
        const bySrc = {};
        listings.forEach(l => { bySrc[l.source] = (bySrc[l.source] || 0) + 1; });
        new Chart(document.getElementById('sourceChart'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(bySrc),
                datasets: [{ data: Object.values(bySrc), backgroundColor: COLORS }]
            },
            options: { plugins: { legend: { position: 'bottom' } } }
        });

        // ── Listings by Car (horizontal bar) ──
        const byCar = {};
        listings.forEach(l => { byCar[l.car_query] = (byCar[l.car_query] || 0) + 1; });
        const sortedCars = Object.entries(byCar).sort((a,b) => b[1] - a[1]);
        new Chart(document.getElementById('carChart'), {
            type: 'bar',
            data: {
                labels: sortedCars.map(c => c[0]),
                datasets: [{ data: sortedCars.map(c => c[1]), backgroundColor: '#4a9eff' }]
            },
            options: {
                indexAxis: 'y',
                plugins: { legend: { display: false } },
                scales: { x: { beginAtZero: true } }
            }
        });

        // ── Price Distribution (histogram) ──
        const bucketSize = 500;
        const buckets = {};
        prices.forEach(p => {
            const b = Math.floor(p / bucketSize) * bucketSize;
            const label = `$${b.toLocaleString()}-${(b + bucketSize).toLocaleString()}`;
            buckets[label] = (buckets[label] || 0) + 1;
        });
        const sortedBuckets = Object.entries(buckets).sort((a,b) => {
            return parseInt(a[0].replace(/\D/g,'')) - parseInt(b[0].replace(/\D/g,''));
        });
        new Chart(document.getElementById('priceChart'), {
            type: 'bar',
            data: {
                labels: sortedBuckets.map(b => b[0]),
                datasets: [{ data: sortedBuckets.map(b => b[1]), backgroundColor: '#4aff8a' }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true } }
            }
        });

        // ── Avg Price by Car (bar) ──
        const carPrices = {};
        listings.forEach(l => {
            if (!l.price) return;
            if (!carPrices[l.car_query]) carPrices[l.car_query] = [];
            carPrices[l.car_query].push(l.price);
        });
        const carAvgs = Object.entries(carPrices)
            .map(([car, ps]) => ({ car, avg: Math.round(ps.reduce((a,b) => a+b, 0) / ps.length) }))
            .sort((a,b) => a.avg - b.avg);
        new Chart(document.getElementById('avgPriceChart'), {
            type: 'bar',
            data: {
                labels: carAvgs.map(c => c.car),
                datasets: [{ data: carAvgs.map(c => c.avg), backgroundColor: '#ffda6b' }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true } }
            }
        });

        // ── Price vs Mileage (scatter) ──
        const scatterData = {};
        listings.forEach(l => {
            if (!l.price || !l.mileage || l.mileage <= 0) return;
            if (!scatterData[l.car_query]) scatterData[l.car_query] = [];
            scatterData[l.car_query].push({ x: l.mileage, y: l.price });
        });
        new Chart(document.getElementById('scatterChart'), {
            type: 'scatter',
            data: {
                datasets: Object.entries(scatterData).map(([car, points], i) => ({
                    label: car,
                    data: points,
                    backgroundColor: COLORS[i % COLORS.length],
                    pointRadius: 5,
                }))
            },
            options: {
                scales: {
                    x: { title: { display: true, text: 'Mileage' } },
                    y: { title: { display: true, text: 'Price ($)' }, beginAtZero: true }
                },
                plugins: { legend: { position: 'bottom' } }
            }
        });

        // ── Best Value Table ──
        const bestPerCar = {};
        listings.forEach(l => {
            if (!l.price) return;
            if (!bestPerCar[l.car_query] || l.price < bestPerCar[l.car_query].price) {
                bestPerCar[l.car_query] = l;
            }
        });
        const tbody = document.querySelector('#bestTable tbody');
        Object.values(bestPerCar)
            .sort((a,b) => a.price - b.price)
            .forEach(l => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${l.car_query}</td>
                    <td>${l.year || '—'}</td>
                    <td>$${l.price.toLocaleString()}</td>
                    <td>${l.mileage ? l.mileage.toLocaleString() + ' mi' : '—'}</td>
                    <td>${l.source}</td>
                    <td>${l.deal_rating || '—'}</td>
                `;
                tbody.appendChild(tr);
            });
    }
    </script>
</body>
</html>
